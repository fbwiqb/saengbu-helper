<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>생기부 로컬</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <div class="bar">
      <select id="groupSel"></select>
      <button id="addBtn">+학생</button>
    </div>
    <div class="viewbar">
      <button id="vStudent" class="sel">학생</button>
      <button id="vDash">대시보드</button>
      <button id="vOverlap">중복점검</button>
    </div>
    <ul id="studentList"></ul>
  </aside>
  <main id="main">
    <section id="dashView" hidden>
      <h2>그룹 진행률</h2>
      <div id="dashProg"></div>
      <div class="dashfilter">
        상태 필터:
        <select id="dashFilter">
          <option value="">전체</option>
          <option value="미작성">미작성</option>
          <option value="초안">초안</option>
          <option value="검증">검증</option>
          <option value="완료">완료</option>
        </select>
      </div>
      <div id="dashTable"></div>
    </section>
    <section id="overlapView" hidden>
      <h2>표현별 사용현황</h2>
      <div id="overlapEvents"></div>
      <h2>고유사도 쌍 경고</h2>
      <div id="overlapPairs"></div>
    </section>
    <header id="head"><span id="headInfo">학생을 선택하세요</span></header>
    <nav id="tabs"></nav>
    <section id="editor" hidden>
      <div class="gauge"><span id="gaugeText"></span><div class="track"><div id="gaugeFill"></div></div></div>
      <textarea id="body" placeholder="본문"></textarea>
      <div id="hl" class="hl"></div>
      <div class="row">
        <label>수정본<textarea id="revised"></textarea></label>
        <label>사유<textarea id="reason"></textarea></label>
      </div>
      <div class="row quality">
        <label>표현<input id="qExp" type="number" min="1" max="5" /></label>
        <label>사고<input id="qThink" type="number" min="1" max="5" /></label>
        <label>성장<input id="qGrowth" type="number" min="1" max="5" /></label>
        <label>진정성<input id="qAuthentic" type="number" min="1" max="5" /></label>
        <label class="chk">채택<input id="accepted" type="checkbox" /></label>
      </div>
      <div class="row">
        <select id="status"><option>미작성</option><option>초안</option><option>검증</option><option>완료</option></select>
        <button id="copyBtn">복사</button>
        <button id="saveBtn">저장</button>
        <button id="promoteBtn">우수예시 승격</button>
      </div>
      <div id="books" class="books"></div>
      <div id="editsPanel" class="edits"></div>
      <div id="legacyBox" class="legacy" hidden>
        <strong>1·2학년 연계</strong>
        <label>중복회피<textarea id="lgDup"></textarea></label>
        <label>성장연결<textarea id="lgGrowth"></textarea></label>
        <label>부족보완<textarea id="lgGap"></textarea></label>
        <button id="lgSave">연계 저장</button>
      </div>
      <ul id="forbidden" class="forbidden"></ul>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
