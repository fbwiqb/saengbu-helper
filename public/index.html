<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>생기부 입력 도우미</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_two@1.2/NanumSquareNeo-Variable.woff2.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <div class="brand">
      <span class="brand-mark">生</span>
      <div class="brand-txt"><strong>생기부 입력 도우미</strong><small>학기별 작성·검토</small></div>
    </div>
    <div class="bar">
      <select id="groupSel"></select>
      <button id="addBtn">+학생</button>
    </div>
    <div class="viewbar">
      <button id="vStudent" class="sel">학생</button>
      <button id="vDash">대시보드</button>
      <button id="vOverlap">중복점검</button>
    </div>
    <ul id="studentList"></ul>
  </aside>

  <main id="main">
    <section id="dashView" hidden>
      <h2>그룹 진행률</h2>
      <div class="dash-head" id="dashProg"></div>
      <div class="dashfilter">
        상태 필터
        <select id="dashFilter">
          <option value="">전체</option>
          <option value="미작성">미작성</option>
          <option value="초안">초안</option>
          <option value="검증">검증</option>
          <option value="완료">완료</option>
        </select>
      </div>
      <div id="dashTable"></div>
    </section>

    <section id="overlapView" hidden>
      <h2>표현별 사용현황</h2>
      <div id="overlapEvents"></div>
      <h2>고유사도 쌍 경고</h2>
      <div id="overlapPairs"></div>
    </section>

    <header id="head" hidden>
      <span id="headInfo">학생을 선택하세요</span>
      <button id="nextBtn" class="btn-ghost">다음 미작성 ▶</button>
    </header>
    <nav id="tabs" hidden></nav>

    <section id="editor" hidden>
      <div class="col-main">
        <div class="card">
          <div class="gauge">
            <div class="glabel"><span id="gaugeArea"></span><span id="gaugeText" class="gnum"></span></div>
            <div class="track"><div id="gaugeFill"></div></div>
          </div>
          <textarea id="body" placeholder="생기부 본문을 입력하세요"></textarea>
        </div>

        <div class="card">
          <div class="actions">
            <select id="status">
              <option>미작성</option><option>초안</option><option>검증</option><option>완료</option>
            </select>
            <span class="spacer"></span>
            <button id="copyBtn" class="btn-ghost">복사</button>
            <button id="saveBtn" class="btn-primary">저장</button>
          </div>
        </div>

      </div>

      <div class="col-side">
        <div class="card">
          <h3>입력 점검</h3>
          <div id="warnings" class="warnings"></div>
        </div>
        <div class="card">
          <h3>추출된 독서</h3>
          <div id="books" class="books-list"></div>
        </div>
        <div class="card">
          <h3>수정 이력</h3>
          <div id="editsPanel" class="edits"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
